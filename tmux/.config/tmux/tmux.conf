#   _
# _| |_ ._ _ _  _ _ __   a simple tmux config
#  | |  | ' ' || | |\ \/ with useful plugins
#  |_|  |_|_|_|`___|/\_\ made by yours truly
#
# configuration: https://wiki.archlinux.org/title/Tmux
# dotfiles repo: https://github.com/ryazh3nka/.dotfiles

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",foot*:Tc"
set-option -a terminal-features 'foot:RGB'
set-option -g focus-events on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

source-file ~/.config/tmux/binds.conf
source-file ~/.config/tmux/theme.conf

run '~/.config/tmux/plugins/tpm/tpm' # clone the repo by yourself!
