monitor = DP-2, 2560x1440@144, 0x0, 1
monitor = , preferred, auto, 1

input {
	kb_layout = us,ru
	kb_options = grp:ctrl_space_toggle, ctrl:nocaps
	follow_mouse = 1
	sensitivity = 0

	touchpad {
		natural_scroll = true
		disable_while_typing = true
		tap-to-click = true
	}
}

gestures {
	workspace_swipe = true
}
